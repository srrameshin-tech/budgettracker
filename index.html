<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SR Budget Tracker</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:15px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#ffe600;
}

.login-box,
.form-box,
.card,
.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input,
select,
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

input,
select{
background:white;
color:black;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.income{
background:#15803d;
}

.expense{
background:#dc2626;
}

.balance{
background:#eab308;
color:black;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#eab308;
color:black;
padding:12px;
}

td{
padding:12px;
text-align:center;
background:#1e293b;
border-bottom:1px solid #334155;
}

.delete-btn{
background:red;
padding:8px 10px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
margin-top:20px;
color:#22c55e;
font-weight:bold;
}

@media(max-width:768px){

table{
font-size:12px;
}

h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<h1>SR Budget Tracker</h1>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<h1>SR Budget Tracker</h1>

<!-- SUMMARY -->

<div class="summary">

<div class="card income">
<h2>Income</h2>
<br>
₹ <span id="income">0</span>
</div>

<div class="card expense">
<h2>Expense</h2>
<br>
₹ <span id="expense">0</span>
</div>

<div class="card balance">
<h2>Balance</h2>
<br>
₹ <span id="balance">0</span>
</div>

</div>

<!-- ENTRY FORM -->

<div class="form-box">

<input type="date" id="date">

<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<input type="text" id="category" placeholder="Category">

<input type="text" id="description" placeholder="Description">

<input type="number" id="amount" placeholder="Amount">

<button onclick="addEntry()">
Add Entry
</button>

</div>

<!-- ACTIONS -->

<div class="actions">

<button onclick="exportExcel()">
Excel Export
</button>

<button onclick="exportPDF()">
PDF Export
</button>

<button onclick="backupData()">
Backup
</button>

<button onclick="shareWhatsApp()">
WhatsApp Share
</button>

<button onclick="logout()">
Logout
</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<footer>
Developed By SR
</footer>

</div>

<script>

/* =========================
SUPABASE
========================= */

const SUPABASE_URL =
"https://YOUR_PROJECT.supabase.co";

const SUPABASE_KEY =
"YOUR_SUPABASE_ANON_KEY";

const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* =========================
CURRENT USER
========================= */

let currentUser = null;

/* =========================
LOGIN
========================= */

async function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(username==="" || password===""){

alert("Enter Login Details");

return;

}

const { data,error } =
await client
.from("users")
.select("*")
.eq("username",username)
.eq("password",password)
.single();

if(data){

currentUser = data;

localStorage.setItem(
"sr_user",
JSON.stringify(data)
);

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("app")
.style.display = "block";

loadEntries();

}else{

alert("Invalid Login");
console.log(error);

}

}

/* =========================
AUTO LOGIN
========================= */

window.onload = ()=>{

let savedUser =
localStorage.getItem("sr_user");

if(savedUser){

currentUser =
JSON.parse(savedUser);

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("app")
.style.display = "block";

loadEntries();

}

};

/* =========================
ADD ENTRY
========================= */

async function addEntry(){

let date =
document.getElementById("date").value;

let type =
document.getElementById("type").value;

let category =
document.getElementById("category").value;

let description =
document.getElementById("description").value;

let amount =
document.getElementById("amount").value;

if(
date==="" ||
category==="" ||
amount===""
){

alert("Fill all fields");

return;

}

await client
.from("entries")
.insert([{

user_id:currentUser.id,
date,
type,
category,
description,
amount

}]);

document.getElementById("category").value="";
document.getElementById("description").value="";
document.getElementById("amount").value="";

loadEntries();

}

/* =========================
LOAD ENTRIES
========================= */

async function loadEntries(){

const { data,error } =
await client
.from("entries")
.select("*")
.eq("user_id",currentUser.id)
.order("date",{ascending:false});

if(error){

console.log(error);

return;

}

let table =
document.getElementById("tableBody");

table.innerHTML = "";

let income = 0;
let expense = 0;

data.forEach(entry=>{

if(entry.type==="Income"){

income += Number(entry.amount);

}else{

expense += Number(entry.amount);

}

table.innerHTML += `

<tr>

<td>${entry.date}</td>

<td>${entry.type}</td>

<td>${entry.category}</td>

<td>${entry.description}</td>

<td>₹ ${entry.amount}</td>

<td>
<button class="delete-btn"
onclick="deleteEntry('${entry.id}')">
Delete
</button>
</td>

</tr>

`;

});

document.getElementById("income")
.innerText = income;

document.getElementById("expense")
.innerText = expense;

document.getElementById("balance")
.innerText = income - expense;

}

/* =========================
DELETE ENTRY
========================= */

async function deleteEntry(id){

let confirmDelete =
confirm("Delete Entry?");

if(!confirmDelete) return;

await client
.from("entries")
.delete()
.eq("id",id);

loadEntries();

}

/* =========================
EXCEL EXPORT
========================= */

function exportExcel(){

let table =
document.querySelector("table");

let workbook =
XLSX.utils.table_to_book(table);

XLSX.writeFile(
workbook,
"SR_Budget_Report.xlsx"
);

}

/* =========================
PDF EXPORT
========================= */

async function exportPDF(){

const { jsPDF } =
window.jspdf;

let doc =
new jsPDF();

doc.setFontSize(20);

doc.text(
"SR Budget Report",
20,
20
);

doc.setFontSize(12);

doc.text(
"Income : ₹ " +
document.getElementById("income").innerText,
20,
40
);

doc.text(
"Expense : ₹ " +
document.getElementById("expense").innerText,
20,
50
);

doc.text(
"Balance : ₹ " +
document.getElementById("balance").innerText,
20,
60
);

doc.save(
"SR_Budget_Report.pdf"
);

}

/* =========================
BACKUP
========================= */

async function backupData(){

const { data } =
await client
.from("entries")
.select("*")
.eq("user_id",currentUser.id);

let blob =
new Blob(
[JSON.stringify(data)],
{
type:"application/json"
}
);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"SR_Backup.json";

a.click();

}

/* =========================
WHATSAPP SHARE
========================= */

function shareWhatsApp(){

let message =

`📊 SR Budget Report

💰 Income : ₹ ${document.getElementById("income").innerText}

💸 Expense : ₹ ${document.getElementById("expense").innerText}

🏦 Balance : ₹ ${document.getElementById("balance").innerText}`;

let url =
"https://wa.me/?text=" +
encodeURIComponent(message);

window.open(
url,
"_blank"
);

}

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.removeItem("sr_user");

location.reload();

}

/* =========================
SERVICE WORKER
========================= */

if("serviceWorker" in navigator){

window.addEventListener(
"load",
()=>{

navigator.serviceWorker
.register("sw.js")
.then(()=>{

console.log("SW Registered");

});

});

}

</script>

</body>
</html>
