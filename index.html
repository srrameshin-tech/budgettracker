<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SR Budget Tracker Pro</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#0a0f1e;--card:#111827;--card2:#1a2235;--border:#1e2d45;--orange:#f59e0b;--orange2:#fbbf24;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--text:#f1f5f9;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:16px;min-height:100%;}
body{max-width:480px;margin:0 auto;padding:0 0 70px;overflow-x:hidden;}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loader.hide{display:none;}
.loader-ring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
.loader-txt{font-size:14px;color:var(--muted);}
/* LOGIN */
.login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--orange),var(--orange2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:18px;box-shadow:0 8px 32px rgba(245,158,11,.4);}
.login-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px;text-align:center;}
.login-sub{font-size:11px;color:var(--muted);margin-bottom:28px;text-align:center;letter-spacing:2px;text-transform:uppercase;}
.login-card{background:var(--card);border-radius:20px;padding:24px;width:100%;border:1px solid var(--border);}
.inp-wrap{margin-bottom:13px;}
.inp-lbl{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.8px;margin-bottom:5px;display:block;text-transform:uppercase;}
.inp{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:16px;outline:none;}
.inp:focus{border-color:var(--orange);}
select.inp{appearance:none;-webkit-appearance:none;}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;border-radius:10px;font-family:inherit;font-size:17px;font-weight:700;color:#1a0f00;cursor:pointer;margin-top:4px;}
.btn-primary:active{transform:scale(.98);}
/* HEADER */
.app-hdr{background:var(--card);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.hdr-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--orange),var(--orange2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hdr-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;flex:1;}
.hdr-role{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(245,158,11,.15);color:var(--orange);}
.logout-btn{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;}
/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;}
.nav-btn{flex:1;padding:10px 4px;border:none;background:transparent;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);transition:.2s;}
.nav-btn .ni{font-size:24px;}
.nav-btn .nl{font-size:12px;font-weight:600;}
.nav-btn.active{color:var(--orange);}
/* TABS */
.tab-content{display:none;animation:fadein .2s ease;}
.tab-content.active{display:block;}
/* SUMMARY */
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0;}
.sum-card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);}
.sum-card.full{grid-column:span 2;}
.sc-lbl{font-size:14px;color:var(--muted);font-weight:600;margin-bottom:5px;}
.sc-val{font-size:26px;font-weight:800;}
.sc-val.inc{color:var(--green);}
.sc-val.exp{color:var(--red);}
.sc-val.bal{color:var(--orange);}
/* FILTER */
.filter-bar{padding:10px 16px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
.filter-btn{flex-shrink:0;padding:8px 15px;border-radius:20px;border:1.5px solid var(--border);background:var(--card2);font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.2s;}
.filter-btn.active{background:var(--orange);border-color:var(--orange);color:#1a0f00;}
.month-row{padding:10px 16px 0;}
/* SEARCH */
.search-wrap{padding:10px 16px 0;position:relative;}
.search-inp{width:100%;padding:10px 14px 10px 38px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.search-inp:focus{border-color:var(--orange);}
.search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}
/* ENTRIES */
.entries-wrap{padding:10px 16px 0;}
.entry-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:fadein .2s ease;}
.entry-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ei-inc{background:rgba(16,185,129,.15);}
.ei-exp{background:rgba(239,68,68,.15);}
.entry-info{flex:1;min-width:0;}
.entry-cat{font-size:16px;font-weight:700;}
.entry-sub{font-size:13px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ebtn{padding:2px 8px;border-radius:5px;border:none;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;}
.ebtn-edit{background:rgba(59,130,246,.15);color:var(--blue);}
.ebtn-del{background:rgba(239,68,68,.12);color:var(--red);}
.entry-right{text-align:right;flex-shrink:0;}
.entry-amt{font-size:18px;font-weight:800;}
.ea-inc{color:var(--green);}
.ea-exp{color:var(--red);}
.entry-date{font-size:12px;color:var(--muted);margin-top:2px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .ei{font-size:40px;margin-bottom:10px;}
/* FORM */
.form-section{padding:14px 16px 0;}
.sec-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:14px;color:var(--orange);}
.form-card{background:var(--card);border-radius:16px;padding:18px;border:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-full{grid-column:span 2;}
.type-toggle{display:flex;background:var(--bg);border-radius:10px;padding:4px;gap:4px;margin-top:5px;}
.type-btn{flex:1;padding:9px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);transition:.2s;}
.type-btn.inc.active{background:var(--green);color:#fff;}
.type-btn.exp.active{background:var(--red);color:#fff;}
/* CHARTS */
.chart-section{padding:14px 16px 0;}
.chart-card{background:var(--card);border-radius:16px;padding:18px;border:1px solid var(--border);margin-bottom:12px;}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px;}
.cat-list{display:flex;flex-direction:column;gap:8px;}
.cat-row{display:flex;align-items:center;gap:8px;}
.cat-name{font-size:11px;font-weight:600;width:75px;flex-shrink:0;}
.cat-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.cat-bar{height:100%;border-radius:3px;transition:width .6s;}
.cat-amt{font-size:11px;font-weight:700;color:var(--orange);width:68px;text-align:right;flex-shrink:0;}
/* SETTINGS */
.settings-section{padding:14px 16px 0;}
.setting-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:12px;}
.setting-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.action-btn{padding:12px 8px;border-radius:10px;border:1px solid var(--border);background:var(--card2);font-family:inherit;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.2s;}
.action-btn:active{transform:scale(.97);}
.action-btn .ab-icon{font-size:22px;}
.action-btn.danger{border-color:rgba(239,68,68,.3);color:var(--red);}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(10,15,30,.88);z-index:500;display:flex;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto;}
.modal-ov.hide{display:none;}
.modal-box{background:var(--card);border-radius:20px 20px 0 0;padding:22px 20px 34px;width:100%;border-top:1px solid var(--border);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-ttl{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.modal-cls{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
/* TOAST */
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(20px);background:#0d2b1a;border:1.5px solid var(--green);color:var(--green);padding:9px 18px;border-radius:10px;font-weight:600;font-size:12px;opacity:0;transition:.3s;z-index:9990;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#2b0d0d;border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-ring"></div><div class="loader-txt">Loading...</div></div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-page">
    <div class="login-logo">💰</div>
    <div class="login-title">SR Budget</div>
    <div class="login-sub">Tracker Pro</div>
    <div class="login-card">
      <div class="inp-wrap"><label class="inp-lbl">Username</label><input class="inp" type="text" id="loginUser" placeholder="admin / public" autocomplete="off"></div>
      <div class="inp-wrap"><label class="inp-lbl">Password</label><input class="inp" type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btn-primary" onclick="login()">🔓 Login</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none;">
  <div class="app-hdr">
    <div class="hdr-logo">💰</div>
    <div class="hdr-title">SR Budget</div>
    <div class="hdr-role" id="roleLabel">Admin</div>
    <button class="logout-btn" onclick="logout()">🚪</button>
  </div>

  <!-- HOME TAB -->
  <div class="tab-content active" id="tab-home">
    <div class="sum-row">
      <div class="sum-card"><div class="sc-lbl">💚 Income</div><div class="sc-val inc" id="totInc">₹0</div></div>
      <div class="sum-card"><div class="sc-lbl">❤️ Expense</div><div class="sc-val exp" id="totExp">₹0</div></div>
      <div class="sum-card full"><div class="sc-lbl">🏦 Balance</div><div class="sc-val bal" id="totBal">₹0</div></div>
    </div>
    <div class="month-row">
      <select class="inp" id="monthFilter" onchange="applyFilters()">
        <option value="">All Months</option>
        <option value="2026-01">Jan 2026</option><option value="2026-02">Feb 2026</option>
        <option value="2026-03">Mar 2026</option><option value="2026-04">Apr 2026</option>
        <option value="2026-05">May 2026</option><option value="2026-06">Jun 2026</option>
        <option value="2026-07">Jul 2026</option><option value="2026-08">Aug 2026</option>
        <option value="2026-09">Sep 2026</option><option value="2026-10">Oct 2026</option>
        <option value="2026-11">Nov 2026</option><option value="2026-12">Dec 2026</option>
      </select>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Income',this)">💚 Income</button>
      <button class="filter-btn" onclick="setFilter('Expense',this)">❤️ Expense</button>
      <button class="filter-btn" onclick="setFilter('Salary',this)">Salary</button>
      <button class="filter-btn" onclick="setFilter('Food',this)">Food</button>
      <button class="filter-btn" onclick="setFilter('Travel',this)">Travel</button>
      <button class="filter-btn" onclick="setFilter('Temple',this)">Temple</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-inp" type="text" id="searchInp" placeholder="Search..." oninput="applyFilters()">
    </div>
    <div class="entries-wrap" id="entriesList"></div>
  </div>

  <!-- ADD TAB -->
  <div class="tab-content" id="tab-add">
    <div class="form-section">
      <div class="sec-title">➕ Add Entry</div>
      <div class="form-card">
        <div class="inp-wrap"><label class="inp-lbl">Type</label>
          <div class="type-toggle">
            <button class="type-btn inc active" id="typeInc" onclick="setAddType('Income')">💚 Income</button>
            <button class="type-btn exp" id="typeExp" onclick="setAddType('Expense')">❤️ Expense</button>
          </div>
        </div>
        <div class="form-grid">
          <div class="inp-wrap"><label class="inp-lbl">User Name</label><input class="inp" type="text" id="addUser" placeholder="Name"></div>
          <div class="inp-wrap"><label class="inp-lbl">Date</label><input class="inp" type="date" id="addDate"></div>
          <div class="inp-wrap"><label class="inp-lbl">Category</label>
            <select class="inp" id="addCat" onchange="if(this.value==='Other'){document.getElementById('addOtherBox').style.display='block'}else{document.getElementById('addOtherBox').style.display='none'}"><option>Salary</option><option>Business</option><option>Food</option><option>Travel</option><option>Temple</option><option>Recharge</option><option>Shopping</option><option>Other</option></select><div id="addOtherBox" style="display:none;margin-top:8px;"><input class="inp" type="text" id="addOtherText" placeholder="✏️ உங்கள் category type பண்ணுங்க..."></div>
          </div>
          <div class="inp-wrap"><label class="inp-lbl">Amount ₹</label><input class="inp" type="number" id="addAmt" placeholder="0" inputmode="numeric"></div>
          <div class="inp-wrap form-full"><label class="inp-lbl">Description</label><input class="inp" type="text" id="addDesc" placeholder="Note..."></div>
        </div>
        <button class="btn-primary" onclick="addEntry()">💾 Save Entry</button>
      </div>
    </div>
  </div>

  <!-- CHART TAB -->
  <div class="tab-content" id="tab-chart">
    <div class="chart-section">
      <div class="sec-title">📊 Analytics</div>
      <div class="chart-card"><div class="chart-title">Income vs Expense (Monthly)</div><canvas id="barChart" height="200"></canvas></div>
      <div class="chart-card"><div class="chart-title">Expense by Category</div><canvas id="pieChart" height="220"></canvas></div>
      <div class="chart-card"><div class="chart-title">Category Breakdown</div><div class="cat-list" id="catList"></div></div>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="tab-content" id="tab-settings">
    <div class="settings-section">
      <div class="sec-title">⚙️ Settings</div>
      <div class="setting-card" id="adminSection">
        <div class="setting-title">🔑 Change Passwords</div>
        <div class="inp-wrap"><label class="inp-lbl">New Admin Password</label><input class="inp" type="password" id="newAdminPw" placeholder="New admin password"></div>
        <div class="inp-wrap"><label class="inp-lbl">New Public Password</label><input class="inp" type="password" id="newPublicPw" placeholder="New public password"></div>
        <button class="btn-primary" onclick="savePasswords()">💾 Save Passwords</button>
      </div>
      <div class="setting-card">
        <div class="setting-title">🛠️ Actions</div>
        <div class="action-grid">
          <button class="action-btn" onclick="exportExcel()"><span class="ab-icon">📊</span>Excel Export</button>
          <button class="action-btn" onclick="exportPDF()"><span class="ab-icon">📄</span>PDF Export</button>
          <button class="action-btn" onclick="backupData()"><span class="ab-icon">💾</span>Backup</button>
          <button class="action-btn" onclick="shareWhatsApp()"><span class="ab-icon">💬</span>WhatsApp</button>
          <button class="action-btn danger" onclick="monthlyReset()"><span class="ab-icon">🔄</span>Monthly Reset</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchTab('home')"><span class="ni">🏠</span><span class="nl">Home</span></button>
    <button class="nav-btn" id="nav-add" onclick="switchTab('add')"><span class="ni">➕</span><span class="nl">Add</span></button>
    <button class="nav-btn" id="nav-chart" onclick="switchTab('chart')"><span class="ni">📊</span><span class="nl">Charts</span></button>
    <button class="nav-btn" id="nav-settings" onclick="switchTab('settings')"><span class="ni">⚙️</span><span class="nl">Settings</span></button>
  </nav>
</div>

<!-- EDIT MODAL -->
<div class="modal-ov hide" id="editModal" onclick="closeEditOut(event)">
  <div class="modal-box">
    <div class="modal-hdr"><span class="modal-ttl">✏️ Edit Entry</span><button class="modal-cls" onclick="closeEdit()">✕</button></div>
    <input type="hidden" id="editId">
    <div class="inp-wrap"><label class="inp-lbl">Type</label>
      <div class="type-toggle">
        <button class="type-btn inc" id="editTypeInc" onclick="setEditType('Income')">💚 Income</button>
        <button class="type-btn exp" id="editTypeExp" onclick="setEditType('Expense')">❤️ Expense</button>
      </div>
    </div>
    <div class="form-grid">
      <div class="inp-wrap"><label class="inp-lbl">User</label><input class="inp" type="text" id="editUser"></div>
      <div class="inp-wrap"><label class="inp-lbl">Date</label><input class="inp" type="date" id="editDate"></div>
      <div class="inp-wrap"><label class="inp-lbl">Category</label>
        <select class="inp" id="editCat" onchange="if(this.value==='Other'){document.getElementById('editOtherBox').style.display='block'}else{document.getElementById('editOtherBox').style.display='none'}"><option>Salary</option><option>Business</option><option>Food</option><option>Travel</option><option>Temple</option><option>Recharge</option><option>Shopping</option><option>Other</option></select><div id="editOtherBox" style="display:none;margin-top:8px;"><input class="inp" type="text" id="editOtherText" placeholder="✏️ உங்கள் category type பண்ணுங்க..."></div>
      </div>
      <div class="inp-wrap"><label class="inp-lbl">Amount ₹</label><input class="inp" type="number" id="editAmt" inputmode="numeric"></div>
      <div class="inp-wrap form-full"><label class="inp-lbl">Description</label><input class="inp" type="text" id="editDesc"></div>
    </div>
    <button class="btn-primary" onclick="saveEdit()">💾 Update Entry</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL="https://ugcinzaizdvkbqpvdjey.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2luemFpemR2a2JxcHZkamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYwODYsImV4cCI6MjA5MjI2MjA4Nn0.mfFEZ7BSNExwXp3vBOp0DPmMCB2g34qQEvrXcOgt3Oo";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let role='public',allData=[],activeFilter='all',addType='Income',editType='Income';
let barInst=null,pieInst=null;

function login(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const ap=localStorage.getItem('adminPassword')||'admin123';
  const pp=localStorage.getItem('publicPassword')||'public123';
  if(u==='admin'&&p===ap){role='admin';}
  else if(u==='public'&&p===pp){role='public';}
  else{showToast('❌ Invalid Login',true);return;}
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('roleLabel').textContent=role==='admin'?'👑 Admin':'👁️ Public';
  if(role==='public'){
    document.getElementById('nav-add').style.display='none';
    document.getElementById('nav-settings').style.display='none';
    document.getElementById('nav-chart').style.display='none';
    document.getElementById('adminSection').style.display='none';
  }
  document.getElementById('addDate').valueAsDate=new Date();
  loadData();
  startRealtime();
}

function logout(){
  document.getElementById('loginPage').style.display='block';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  allData=[];
}

function switchTab(t){
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('nav-'+t).classList.add('active');
  if(t==='chart')renderCharts();
}

async function loadData(){
  document.getElementById('loader').classList.remove('hide');
  const{data,error}=await db.from('entries').select('*').order('id',{ascending:false});
  document.getElementById('loader').classList.add('hide');
  if(error){showToast('❌ Load failed',true);return;}
  allData=data||[];
  applyFilters();
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  applyFilters();
}

function applyFilters(){
  const s=document.getElementById('searchInp').value.toLowerCase();
  const m=document.getElementById('monthFilter').value;
  let d=allData;
  if(activeFilter!=='all')d=d.filter(e=>e.type===activeFilter||e.category===activeFilter);
  if(m)d=d.filter(e=>e.date&&e.date.startsWith(m));
  if(s)d=d.filter(e=>(e.description||'').toLowerCase().includes(s)||(e.category||'').toLowerCase().includes(s)||(e.username||'').toLowerCase().includes(s));
  renderEntries(d);
  updateSummary(d);
}

const catEmoji={Salary:'💼',Business:'🏢',Food:'🍽️',Travel:'🚗',Temple:'🛕',Recharge:'📱',Shopping:'🛍️',Other:'📌'};

function renderEntries(data){
  const el=document.getElementById('entriesList');
  if(!data.length){el.innerHTML='<div class="empty-state"><div class="ei">📭</div><div style="font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:4px;">No entries</div></div>';return;}
  el.innerHTML=data.map(e=>{
    const inc=e.type==='Income';
    const em=catEmoji[e.category]||'📌';
    return`<div class="entry-card">
      <div class="entry-icon ${inc?'ei-inc':'ei-exp'}">${em}</div>
      <div class="entry-info">
        <div class="entry-cat">${e.category}</div>
        <div class="entry-sub">${e.username||'—'}${e.description?' • '+e.description:''}
          ${role==='admin'?`<button class="ebtn ebtn-edit" onclick="openEdit(${e.id})">✏️ Edit</button><button class="ebtn ebtn-del" onclick="delEntry(${e.id})">🗑️</button>`:''}
        </div>
      </div>
      <div class="entry-right">
        <div class="entry-amt ${inc?'ea-inc':'ea-exp'}">${inc?'+':'-'}₹${Number(e.amount).toLocaleString('en-IN')}</div>
        <div class="entry-date">${fmtDate(e.date)}</div>
      </div>
    </div>`;
  }).join('');
}

function fmtDate(d){if(!d)return'—';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}

function updateSummary(data){
  let inc=0,exp=0;
  data.forEach(e=>{if(e.type==='Income')inc+=Number(e.amount)||0;else exp+=Number(e.amount)||0;});
  document.getElementById('totInc').textContent='₹'+inc.toLocaleString('en-IN');
  document.getElementById('totExp').textContent='₹'+exp.toLocaleString('en-IN');
  const bal=inc-exp;
  const el=document.getElementById('totBal');
  el.textContent='₹'+Math.abs(bal).toLocaleString('en-IN')+(bal<0?' (Deficit)':'');
  el.style.color=bal>=0?'var(--orange)':'var(--red)';
}

function setAddType(t){
  addType=t;
  document.getElementById('typeInc').classList.toggle('active',t==='Income');
  document.getElementById('typeExp').classList.toggle('active',t==='Expense');
}

async function addEntry(){
  const u=document.getElementById('addUser').value.trim();
  const d=document.getElementById('addDate').value;
  const catSel=document.getElementById('addCat').value;
  const c=catSel==='Other'?(document.getElementById('addOtherText').value.trim()||'Other'):catSel;
  const desc=document.getElementById('addDesc').value.trim();
  const a=document.getElementById('addAmt').value;
  if(!u||!d||!a){showToast('❌ Fill all fields!',true);return;}
  if(catSel==='Other'&&!document.getElementById('addOtherText').value.trim()){showToast('❌ Category தேவை!',true);return;}
  document.getElementById('loader').classList.remove('hide');
  const{error}=await db.from('entries').insert([{username:u,date:d,type:addType,category:c,description:desc,amount:Number(a)}]);
  document.getElementById('loader').classList.add('hide');
  if(error){showToast('❌ Save failed',true);return;}
  showToast('✅ Entry saved!');
  document.getElementById('addAmt').value='';
  document.getElementById('addDesc').value='';
  loadData();switchTab('home');
}

function openEdit(id){
  const e=allData.find(x=>x.id===id);if(!e)return;
  document.getElementById('editId').value=id;
  document.getElementById('editUser').value=e.username||'';
  document.getElementById('editDate').value=e.date||'';
  const stdCats=['Salary','Business','Food','Travel','Temple','Recharge','Shopping','Other'];
  if(stdCats.includes(e.category)){
    document.getElementById('editCat').value=e.category;
    document.getElementById('editOtherBox').style.display='none';
    document.getElementById('editOtherText').value='';
  } else {
    document.getElementById('editCat').value='Other';
    document.getElementById('editOtherBox').style.display='block';
    document.getElementById('editOtherText').value=e.category||'';
  }
  setEditType(e.type||'Income');
  document.getElementById('editModal').classList.remove('hide');
}

function setEditType(t){
  editType=t;
  document.getElementById('editTypeInc').classList.toggle('active',t==='Income');
  document.getElementById('editTypeExp').classList.toggle('active',t==='Expense');
}

function closeEdit(){document.getElementById('editModal').classList.add('hide');}
function closeEditOut(e){if(e.target===document.getElementById('editModal'))closeEdit();}

async function saveEdit(){
  const id=document.getElementById('editId').value;
  const u=document.getElementById('editUser').value.trim();
  const d=document.getElementById('editDate').value;
  const catSel=document.getElementById('editCat').value;
  const c=catSel==='Other'?(document.getElementById('editOtherText').value.trim()||'Other'):catSel;
  const desc=document.getElementById('editDesc').value.trim();
  const a=document.getElementById('editAmt').value;
  if(!u||!d||!a){showToast('❌ Fill all fields!',true);return;}
  if(catSel==='Other'&&!document.getElementById('editOtherText').value.trim()){showToast('❌ Category தேவை!',true);return;}
  document.getElementById('loader').classList.remove('hide');
  const{error}=await db.from('entries').update({username:u,date:d,type:editType,category:c,description:desc,amount:Number(a)}).eq('id',id);
  document.getElementById('loader').classList.add('hide');
  if(error){showToast('❌ Update failed',true);return;}
  showToast('✅ Updated!');closeEdit();loadData();
}

async function delEntry(id){
  if(!confirm('Delete this entry?'))return;
  await db.from('entries').delete().eq('id',id);
  showToast('🗑️ Deleted!');loadData();
}

function renderCharts(){
  const months={};
  allData.forEach(e=>{
    if(!e.date)return;
    const m=e.date.substring(0,7);
    if(!months[m])months[m]={inc:0,exp:0};
    if(e.type==='Income')months[m].inc+=Number(e.amount)||0;
    else months[m].exp+=Number(e.amount)||0;
  });
  const labels=Object.keys(months).sort().slice(-6);
  const incD=labels.map(m=>months[m]?.inc||0);
  const expD=labels.map(m=>months[m]?.exp||0);
  if(barInst)barInst.destroy();
  barInst=new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',
    data:{labels:labels.map(l=>{const p=l.split('-');return p[1]+'/'+p[0].slice(2);}),
    datasets:[{label:'Income',data:incD,backgroundColor:'rgba(16,185,129,.7)',borderRadius:6},{label:'Expense',data:expD,backgroundColor:'rgba(239,68,68,.7)',borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{x:{ticks:{color:'#64748b'}},y:{ticks:{color:'#64748b'}}}}
  });
  const cats={};
  allData.filter(e=>e.type==='Expense').forEach(e=>{cats[e.category]=(cats[e.category]||0)+(Number(e.amount)||0);});
  const cLabels=Object.keys(cats);
  const cData=cLabels.map(c=>cats[c]);
  const colors=['#f59e0b','#ef4444','#3b82f6','#10b981','#8b5cf6','#f97316','#06b6d4','#84cc16'];
  if(pieInst)pieInst.destroy();
  pieInst=new Chart(document.getElementById('pieChart').getContext('2d'),{
    type:'doughnut',
    data:{labels:cLabels,datasets:[{data:cData,backgroundColor:colors,borderWidth:0}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}}}
  });
  const total=cData.reduce((a,b)=>a+b,0);
  document.getElementById('catList').innerHTML=cLabels.sort((a,b)=>cats[b]-cats[a]).map((c,i)=>`
    <div class="cat-row">
      <div class="cat-name">${catEmoji[c]||'📌'} ${c}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${total?cats[c]/total*100:0}%;background:${colors[i%colors.length]}"></div></div>
      <div class="cat-amt">₹${cats[c].toLocaleString('en-IN')}</div>
    </div>`).join('');
}

function exportExcel(){
  const t=document.createElement('table');
  t.innerHTML=`<thead><tr><th>User</th><th>Date</th><th>Type</th><th>Category</th><th>Description</th><th>Amount</th></tr></thead><tbody>${allData.map(e=>`<tr><td>${e.username}</td><td>${e.date}</td><td>${e.type}</td><td>${e.category}</td><td>${e.description||''}</td><td>${e.amount}</td></tr>`).join('')}</tbody>`;
  const wb=XLSX.utils.table_to_book(t);XLSX.writeFile(wb,'SR_Budget_Report.xlsx');
  showToast('📊 Excel exported!');
}

async function exportPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  let inc=0,exp=0;allData.forEach(e=>{if(e.type==='Income')inc+=Number(e.amount);else exp+=Number(e.amount);});
  doc.setFontSize(20);doc.text('SR Budget Report',20,20);
  doc.setFontSize(13);
  doc.text('Income  : Rs.'+inc.toLocaleString('en-IN'),20,40);
  doc.text('Expense : Rs.'+exp.toLocaleString('en-IN'),20,52);
  doc.text('Balance : Rs.'+(inc-exp).toLocaleString('en-IN'),20,64);
  doc.setFontSize(9);let y=80;
  allData.slice(0,50).forEach(e=>{
    doc.text(`${e.date}  ${e.type}  ${e.category}  Rs.${e.amount}  ${e.username}`,14,y);
    y+=7;if(y>270){doc.addPage();y=20;}
  });
  doc.save('SR_Report.pdf');showToast('📄 PDF exported!');
}

async function backupData(){
  const{data}=await db.from('entries').select('*');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));
  a.download='backup.json';a.click();showToast('💾 Backup downloaded!');
}

function shareWhatsApp(){
  let inc=0,exp=0;allData.forEach(e=>{if(e.type==='Income')inc+=Number(e.amount);else exp+=Number(e.amount);});
  window.open('https://wa.me/?text='+encodeURIComponent(`SR Budget Report\n\nIncome : Rs.${inc.toLocaleString('en-IN')}\nExpense: Rs.${exp.toLocaleString('en-IN')}\nBalance: Rs.${(inc-exp).toLocaleString('en-IN')}`),'_blank');
}

async function monthlyReset(){
  if(!confirm('Archive & reset all entries?'))return;
  const{data}=await db.from('entries').select('*');
  localStorage.setItem('archive_backup',JSON.stringify(data));
  await db.from('entries').delete().neq('id',0);
  showToast('🔄 Reset done!');loadData();
}

function savePasswords(){
  const a=document.getElementById('newAdminPw').value;
  const p=document.getElementById('newPublicPw').value;
  if(a)localStorage.setItem('adminPassword',a);
  if(p)localStorage.setItem('publicPassword',p);
  showToast('🔑 Passwords saved!');
  document.getElementById('newAdminPw').value='';
  document.getElementById('newPublicPw').value='';
}

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

// REAL-TIME SUBSCRIPTION
function startRealtime(){
  db.channel('entries-realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:'entries'},()=>{
      loadData();
    })
    .subscribe();
}

document.getElementById('loader').classList.add('hide');
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
