<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SR Budget Tracker Pro</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#020c2b;
color:white;
padding:15px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#ffe600;
}

.card,
.form-box,
.table-box{
background:#16213e;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,
select,
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

input,
select{
background:white;
color:black;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.income{
background:#15803d;
}

.expense{
background:#dc2626;
}

.balance{
background:#eab308;
color:black;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#eab308;
color:black;
padding:10px;
}

td{
padding:10px;
text-align:center;
background:#1e293b;
border-bottom:1px solid #334155;
}

.delete-btn{
background:red;
padding:8px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
margin-top:20px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<h1>SR Budget Tracker</h1>

<div class="summary">

<div class="card income">
<h2>Income</h2>
<br>
₹ <span id="income">0</span>
</div>

<div class="card expense">
<h2>Expense</h2>
<br>
₹ <span id="expense">0</span>
</div>

<div class="card balance">
<h2>Balance</h2>
<br>
₹ <span id="balance">0</span>
</div>

</div>

<div class="form-box">

<input type="text" id="username" placeholder="User Name">

<input type="date" id="date">

<select id="type">

<option>Income</option>
<option>Expense</option>

</select>

<select id="category">

<option>Salary</option>
<option>Business</option>
<option>Food</option>
<option>Travel</option>
<option>Temple</option>
<option>Shopping</option>
<option>Recharge</option>
<option>Other</option>

</select>

<input type="text" id="description" placeholder="Description">

<input type="number" id="amount" placeholder="Amount">

<button onclick="addEntry()">
Add Entry
</button>

</div>

<div class="actions">

<button onclick="exportExcel()">
Excel Export
</button>

<button onclick="exportPDF()">
PDF Export
</button>

<button onclick="backupData()">
Backup
</button>

<button onclick="shareWhatsApp()">
WhatsApp Share
</button>

<button onclick="monthlyReset()">
Monthly Reset
</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>User</th>
<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<footer>
Developed By SR
</footer>

<script>

const SUPABASE_URL =
"https://ugcinzaizdvkbqpvdjey.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2luemFpemR2a2JxcHZkamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYwODYsImV4cCI6MjA5MjI2MjA4Nn0.mfFEZ7BSNExwXp3vBOp0DPmMCB2g34qQEvrXcOgt3Oo";

const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

loadEntries();

async function loadEntries(){

const { data,error } =
await client
.from("entries")
.select("*")
.order("id",{ascending:false});

if(error){

console.log(error);

alert("Database Error");

return;

}

let table =
document.getElementById("tableBody");

table.innerHTML = "";

let income = 0;
let expense = 0;

data.forEach(entry=>{

if(entry.type==="Income"){

income += Number(entry.amount);

}else{

expense += Number(entry.amount);

}

table.innerHTML += `

<tr>

<td>${entry.username}</td>
<td>${entry.date}</td>
<td>${entry.type}</td>
<td>${entry.category}</td>
<td>${entry.description}</td>
<td>₹ ${entry.amount}</td>

<td>

<button class="delete-btn"
onclick="deleteEntry(${entry.id})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById("income")
.innerText = income;

document.getElementById("expense")
.innerText = expense;

document.getElementById("balance")
.innerText = income - expense;

}

async function addEntry(){

let username =
document.getElementById("username").value;

let date =
document.getElementById("date").value;

let type =
document.getElementById("type").value;

let category =
document.getElementById("category").value;

let description =
document.getElementById("description").value;

let amount =
document.getElementById("amount").value;

if(
username==="" ||
date==="" ||
amount===""){

alert("Fill all fields");

return;

}

await client
.from("entries")
.insert([{

username,
date,
type,
category,
description,
amount

}]);

document.getElementById("description").value="";
document.getElementById("amount").value="";

loadEntries();

}

async function deleteEntry(id){

await client
.from("entries")
.delete()
.eq("id",id);

loadEntries();

}

function exportExcel(){

let table =
document.querySelector("table");

let workbook =
XLSX.utils.table_to_book(table);

XLSX.writeFile(
workbook,
"SR_Budget_Report.xlsx"
);

}

async function exportPDF(){

const { jsPDF } =
window.jspdf;

let doc =
new jsPDF();

doc.text(
"SR Budget Report",
20,
20
);

doc.text(
"Income : ₹ " +
document.getElementById("income").innerText,
20,
40
);

doc.text(
"Expense : ₹ " +
document.getElementById("expense").innerText,
20,
55
);

doc.text(
"Balance : ₹ " +
document.getElementById("balance").innerText,
20,
70
);

doc.save(
"SR_Budget_Report.pdf"
);

}

async function backupData(){

const { data } =
await client
.from("entries")
.select("*");

let blob =
new Blob(
[JSON.stringify(data)],
{
type:"application/json"
}
);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"backup.json";

a.click();

}

function shareWhatsApp(){

let today =
new Date();

let month =
today.toLocaleString(
'default',
{
month:'long'
}
);

let year =
today.getFullYear();

let message =

`📊 ${month} ${year} Budget Report

💰 ${month} ${year} Income : ₹ ${document.getElementById("income").innerText}

💸 ${month} ${year} Expense : ₹ ${document.getElementById("expense").innerText}

🏦 ${month} ${year} Balance : ₹ ${document.getElementById("balance").innerText}`;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(message),
"_blank"
);

}

async function monthlyReset(){

let ok =
confirm("Monthly Reset?");

if(!ok) return;

await client
.from("entries")
.delete()
.neq("id",0);

loadEntries();

alert("Reset Completed");

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"sw.js"
);

}

</script>

</body>
</html>
