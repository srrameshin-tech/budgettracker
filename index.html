<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Budget Tracker Pro</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020c2b;
color:white;
padding:15px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#ffe600;
font-size:34px;
}

.card,
.form-box,
.table-box{
background:#16213e;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,
select,
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

input,
select{
background:white;
color:black;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.income{
background:#15803d;
}

.expense{
background:#dc2626;
}

.balance{
background:#eab308;
color:black;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#eab308;
color:black;
padding:10px;
}

td{
padding:10px;
text-align:center;
background:#1e293b;
border-bottom:1px solid #334155;
}

.delete-btn{
background:red;
padding:8px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
margin-top:20px;
color:#22c55e;
font-weight:bold;
}

</style>
</head>

<body>

<div id="loginPage" class="form-box">

<h1>SR Budget Login</h1>

<input type="text" id="loginUsername" placeholder="Username">

<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<div id="mainApp" style="display:none;">

<h1>SR Budget Tracker Pro</h1>

<div class="summary">

<div class="card income">
<h2>Total Income</h2>
<br>
₹ <span id="income">0</span>
</div>

<div class="card expense">
<h2>Total Expense</h2>
<br>
₹ <span id="expense">0</span>
</div>

<div class="card balance">
<h2>Balance</h2>
<br>
₹ <span id="balance">0</span>
</div>

</div>

<div class="form-box" id="entryForm">

<input type="text" id="username" placeholder="User Name">

<input type="date" id="date">

<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<select id="category">
<option>Salary</option>
<option>Business</option>
<option>Food</option>
<option>Travel</option>
<option>Temple</option>
<option>Recharge</option>
<option>Shopping</option>
<option>Other</option>
</select>

<input type="text" id="description" placeholder="Description">

<input type="number" id="amount" placeholder="Amount">

<button onclick="addEntry()">
Add Entry
</button>

</div>

<div id="passwordPanel" class="form-box" style="display:none;">

<h2>Change Password</h2>

<input type="password" id="newAdminPassword" placeholder="New Admin Password">

<input type="password" id="newPublicPassword" placeholder="New Public Password">

<button onclick="savePasswords()">
Save Passwords
</button>

</div>

<div class="actions" id="actionsPanel">

<button onclick="exportExcel()">
Excel Export
</button>

<button onclick="exportPDF()">
PDF Export
</button>

<button onclick="backupData()">
Backup
</button>

<button onclick="shareWhatsApp()">
WhatsApp Share
</button>

<button onclick="monthlyReset()">
Monthly Reset
</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>User</th>
<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<footer>
Developed By SR
</footer>

</div>

<script>

const SUPABASE_URL =
"https://ugcinzaizdvkbqpvdjey.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2luemFpemR2a2JxcHZkamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYwODYsImV4cCI6MjA5MjI2MjA4Nn0.mfFEZ7BSNExwXp3vBOp0DPmMCB2g34qQEvrXcOgt3Oo";

const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let currentRole = "public";

function login(){

let username =
document.getElementById("loginUsername").value;

let password =
document.getElementById("loginPassword").value;

let adminPass =
localStorage.getItem("adminPassword") || "admin123";

let publicPass =
localStorage.getItem("publicPassword") || "public123";

if(
username === "admin" &&
password === adminPass
){

currentRole = "admin";

}else if(
username === "public" &&
password === publicPass
){

currentRole = "public";

}else{

alert("Invalid Login");
return;

}

document.getElementById("loginPage")
.style.display = "none";

document.getElementById("mainApp")
.style.display = "block";

if(currentRole === "public"){

document.getElementById("entryForm")
.style.display = "none";

document.getElementById("actionsPanel")
.style.display = "none";

}

if(currentRole === "admin"){

document.getElementById("passwordPanel")
.style.display = "block";

}

loadEntries();

}

function savePasswords(){

let adminPassword =
document.getElementById("newAdminPassword").value;

let publicPassword =
document.getElementById("newPublicPassword").value;

if(adminPassword !== ""){

localStorage.setItem(
"adminPassword",
adminPassword
);

}

if(publicPassword !== ""){

localStorage.setItem(
"publicPassword",
publicPassword
);

}

alert("Passwords Updated");

}

async function loadEntries(){

const { data,error } =
await client
.from("entries")
.select("*")
.order("id",{ascending:false});

if(error){

console.log(error);
return;

}

let table =
document.getElementById("tableBody");

table.innerHTML = "";

let income = 0;
let expense = 0;

data.forEach(entry=>{

if(entry.type === "Income"){

income += Number(entry.amount);

}else{

expense += Number(entry.amount);

}

table.innerHTML += `

<tr>

<td>${entry.username}</td>

<td>${entry.date}</td>

<td>${entry.type}</td>

<td>${entry.category}</td>

<td>${entry.description}</td>

<td>₹ ${entry.amount}</td>

${
currentRole === "admin"
?
`
<td>
<button
class="delete-btn"
onclick="deleteEntry(${entry.id})">
Delete
</button>
</td>
`
:
`
<td>-</td>
`
}

</tr>

`;

});

document.getElementById("income")
.innerText = income;

document.getElementById("expense")
.innerText = expense;

document.getElementById("balance")
.innerText = income - expense;

}

async function addEntry(){

let username =
document.getElementById("username").value;

let date =
document.getElementById("date").value;

let type =
document.getElementById("type").value;

let category =
document.getElementById("category").value;

let description =
document.getElementById("description").value;

let amount =
document.getElementById("amount").value;

if(
username === "" ||
date === "" ||
amount === ""
){

alert("Fill All Fields");
return;

}

await client
.from("entries")
.insert([{
username,
date,
type,
category,
description,
amount
}]);

loadEntries();

}

async function deleteEntry(id){

await client
.from("entries")
.delete()
.eq("id",id);

loadEntries();

}

function exportExcel(){

let table =
document.querySelector("table");

let workbook =
XLSX.utils.table_to_book(table);

XLSX.writeFile(
workbook,
"SR_Budget_Report.xlsx"
);

}

async function exportPDF(){

const { jsPDF } =
window.jspdf;

let doc =
new jsPDF();

doc.setFontSize(22);

doc.text(
"SR Budget Report",
20,
20
);

doc.text(
"Income : ₹ " +
document.getElementById("income").innerText,
20,
45
);

doc.text(
"Expense : ₹ " +
document.getElementById("expense").innerText,
20,
60
);

doc.text(
"Balance : ₹ " +
document.getElementById("balance").innerText,
20,
75
);

doc.save(
"SR_Report.pdf"
);

}

async function backupData(){

const { data } =
await client
.from("entries")
.select("*");

let blob =
new Blob(
[
JSON.stringify(data)
],
{
type:"application/json"
}
);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"backup.json";

a.click();

}

function shareWhatsApp(){

let message =
`📊 SR Budget Report

💰 Income : ₹ ${document.getElementById("income").innerText}

💸 Expense : ₹ ${document.getElementById("expense").innerText}

🏦 Balance : ₹ ${document.getElementById("balance").innerText}`;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(message),
"_blank"
);

}

async function monthlyReset(){

let ok =
confirm(
"Archive Old Entries And Reset?"
);

if(!ok) return;

const { data } =
await client
.from("entries")
.select("*");

localStorage.setItem(
"archive_backup",
JSON.stringify(data)
);

await client
.from("entries")
.delete()
.neq("id",0);

loadEntries();

alert("Monthly Reset Completed");

}

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("sw.js");

}

</script>

</body>
</html>
