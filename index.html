<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SR Budget Tracker Pro</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#020c2b;
color:white;
padding:10px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#ffe600;
font-size:32px;
}

.card,
.form-box,
.table-box{
background:#16213e;
padding:15px;
border-radius:18px;
margin-bottom:20px;
}

input,
select,
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

input,
select{
background:white;
color:black;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.summary{
display:grid;
grid-template-columns:1fr;
gap:15px;
margin-bottom:20px;
}

.income{
background:#15803d;
}

.expense{
background:#dc2626;
}

.balance{
background:#eab308;
color:black;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.table-box{
overflow-x:auto;
}

table{
width:100%;
min-width:900px;
border-collapse:collapse;
}

th{
background:#eab308;
color:black;
padding:10px;
}

td{
padding:10px;
text-align:center;
background:#1e293b;
border-bottom:1px solid #334155;
white-space:nowrap;
}

.delete-btn{
background:red;
padding:8px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.edit-btn{
background:orange;
padding:8px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
margin-top:20px;
color:#22c55e;
font-weight:bold;
}

@media(min-width:768px){

.summary{
grid-template-columns:1fr 1fr 1fr;
}

.actions{
grid-template-columns:repeat(5,1fr);
}

}

</style>

</head>

<body>

<h1>SR Budget Tracker</h1>

<div class="summary">

<div class="card income">
<h2>Income</h2>
<br>
₹ <span id="income">0</span>
</div>

<div class="card expense">
<h2>Expense</h2>
<br>
₹ <span id="expense">0</span>
</div>

<div class="card balance">
<h2>Balance</h2>
<br>
₹ <span id="balance">0</span>
</div>

</div>

<div class="form-box">

<input type="text" id="username" placeholder="User Name">

<input type="date" id="date">

<select id="type">

<option>Income</option>
<option>Expense</option>

</select>

<select id="category" onchange="checkOtherCategory()">

<option>Salary</option>
<option>Business</option>
<option>Food</option>
<option>Travel</option>
<option>Temple</option>
<option>Shopping</option>
<option>Recharge</option>
<option>Other</option>

</select>

<input
type="text"
id="customCategory"
placeholder="Enter Custom Category"
style="display:none;">

<input type="text" id="description" placeholder="Description">

<input type="number" id="amount" placeholder="Amount">

<button onclick="addEntry()">
Add Entry
</button>

</div>

<div class="actions">

<button onclick="exportExcel()">
Excel Export
</button>

<button onclick="exportPDF()">
PDF Export
</button>

<button onclick="backupData()">
Backup
</button>

<button onclick="shareWhatsApp()">
WhatsApp Share
</button>

<button onclick="monthlyReset()">
Monthly Reset
</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>User</th>
<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
<th>Edit</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<footer>
Developed By SR
</footer>

<script>

const SUPABASE_URL =
"https://ugcinzaizdvkbqpvdjey.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2luemFpemR2a2JxcHZkamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYwODYsImV4cCI6MjA5MjI2MjA4Nn0.mfFEZ7BSNExwXp3vBOp0DPmMCB2g34qQEvrXcOgt3Oo";

const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

loadEntries();

function checkOtherCategory(){

let category =
document.getElementById("category").value;

if(category==="Other"){

document.getElementById("customCategory")
.style.display = "block";

}else{

document.getElementById("customCategory")
.style.display = "none";

}

}

async function loadEntries(){

const { data,error } =
await client
.from("entries")
.select("*")
.order("id",{ascending:false});

if(error){

console.log(error);

alert("Database Error");

return;

}

let table =
document.getElementById("tableBody");

table.innerHTML = "";

let income = 0;
let expense = 0;

data.forEach(entry=>{

if(entry.type==="Income"){

income += Number(entry.amount);

}else{

expense += Number(entry.amount);

}

table.innerHTML += `

<tr>

<td>${entry.username}</td>
<td>${entry.date}</td>
<td>${entry.type}</td>
<td>${entry.category}</td>
<td>${entry.description}</td>
<td>₹ ${entry.amount}</td>

<td>

<button class="edit-btn"
onclick="editEntry(${entry.id},
'${entry.username}',
'${entry.date}',
'${entry.type}',
'${entry.category}',
'${entry.description}',
'${entry.amount}')">

Edit

</button>

</td>

<td>

<button class="delete-btn"
onclick="deleteEntry(${entry.id})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById("income")
.innerText = income;

document.getElementById("expense")
.innerText = expense;

document.getElementById("balance")
.innerText = income - expense;

}

async function addEntry(){

let username =
document.getElementById("username").value;

let date =
document.getElementById("date").value;

let type =
document.getElementById("type").value;

let category =
document.getElementById("category").value;

if(category==="Other"){

category =
document.getElementById("customCategory").value;

}

let description =
document.getElementById("description").value;

let amount =
document.getElementById("amount").value;

if(
username==="" ||
date==="" ||
amount===""){

alert("Fill all fields");

return;

}

await client
.from("entries")
.insert([{

username,
date,
type,
category,
description,
amount

}]);

document.getElementById("description").value="";
document.getElementById("amount").value="";
document.getElementById("customCategory").value="";

loadEntries();

}

async function editEntry(
id,
username,
date,
type,
category,
description,
amount
){

document.getElementById("username").value =
username;

document.getElementById("date").value =
date;

document.getElementById("type").value =
type;

document.getElementById("category").value =
category;

document.getElementById("description").value =
description;

document.getElementById("amount").value =
amount;

await client
.from("entries")
.delete()
.eq("id",id);

loadEntries();

}

async function deleteEntry(id){

await client
.from("entries")
.delete()
.eq("id",id);

loadEntries();

}

function exportExcel(){

let table =
document.querySelector("table");

let workbook =
XLSX.utils.table_to_book(table);

XLSX.writeFile(
workbook,
"SR_Budget_Report.xlsx"
);

}

async function exportPDF(){

const { jsPDF } =
window.jspdf;

let doc =
new jsPDF();

doc.text(
"SR Budget Report",
20,
20
);

doc.text(
"Income : ₹ " +
document.getElementById("income").innerText,
20,
40
);

doc.text(
"Expense : ₹ " +
document.getElementById("expense").innerText,
20,
55
);

doc.text(
"Balance : ₹ " +
document.getElementById("balance").innerText,
20,
70
);

doc.save(
"SR_Budget_Report.pdf"
);

}

async function backupData(){

const { data } =
await client
.from("entries")
.select("*");

let blob =
new Blob(
[JSON.stringify(data)],
{
type:"application/json"
}
);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"backup.json";

a.click();

}

function shareWhatsApp(){

let today =
new Date();

let currentDay =
today.getDate();

let currentMonth =
today.toLocaleString(
'default',
{
month:'long'
}
);

let currentYear =
today.getFullYear();

let previousMonthDate =
new Date(
today.getFullYear(),
today.getMonth()-1,
1
);

let previousMonth =
previousMonthDate.toLocaleString(
'default',
{
month:'long'
}
);

let previousYear =
previousMonthDate.getFullYear();

let previousIncome = 0;
let previousExpense = 0;

let currentIncome = 0;
let currentExpense = 0;

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let rowDate =
row.children[1].innerText;

let rowType =
row.children[2].innerText;

let amount =
Number(
row.children[5]
.innerText
.replace("₹","")
.trim()
);

let dateObj =
new Date(rowDate);

let rowMonth =
dateObj.getMonth();

let rowYear =
dateObj.getFullYear();

if(
rowMonth === previousMonthDate.getMonth() &&
rowYear === previousYear
){

if(rowType==="Income"){

previousIncome += amount;

}else{

previousExpense += amount;

}

}

if(
rowMonth === today.getMonth() &&
rowYear === currentYear &&
dateObj.getDate() <= currentDay
){

if(rowType==="Income"){

currentIncome += amount;

}else{

currentExpense += amount;

}

}

});

let previousBalance =
previousIncome - previousExpense;

let currentBalance =
currentIncome - currentExpense;

let message =

`📊 ${previousMonth} ${previousYear} Budget Report

💰 ${previousMonth} Income : ₹ ${previousIncome}

💸 ${previousMonth} Expense : ₹ ${previousExpense}

🏦 ${previousMonth} Balance : ₹ ${previousBalance}

----------------------------

📅 As on ${currentDay} ${currentMonth} ${currentYear}

💰 Current Month Income : ₹ ${currentIncome}

💸 Current Month Expense : ₹ ${currentExpense}

🏦 Current Balance : ₹ ${currentBalance}`;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(message),
"_blank"
);

}

async function monthlyReset(){

let ok =
confirm("Monthly Reset?");

if(!ok) return;

await client
.from("entries")
.delete()
.neq("id",0);

loadEntries();

alert("Reset Completed");

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"sw.js"
);

}

</script>

</body>
</html>
